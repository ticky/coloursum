[package]
name = "coloursum"
description = "🎨 Colourise your checksum output"
version = "0.2.0"
authors = ["Jessica Stokes <hello@jessicastokes.net>"]
edition = "2018"
repository = "https://github.com/ticky/coloursum"
readme = "Readme.md"
license = "MIT"

[badges]
travis-ci = { repository = "ticky/coloursum", branch = "develop" }
codecov = { repository = "ticky/coloursum", branch = "develop" }

[dependencies]
ansi_term = "0.12.1"
ecoji = "1.0.0"
itertools = "0.9.0"
structopt = "0.3.13"

[target.'cfg(unix)'.dependencies]
sysinfo = "0.13.1"
which = { version = "3.1.1", default-features = false }

[dev-dependencies]
indoc = "0.3.5"
